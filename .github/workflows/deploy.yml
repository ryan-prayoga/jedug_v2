name: Deploy JEDUG

on:
  push:
    branches:
      - main

concurrency:
  group: jedug-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        working-directory: /home/ubuntu/projects/jedug_v2
        run: |
          set -Eeuo pipefail
          PREVIOUS_REF="$(git rev-parse HEAD)"
          echo "PREVIOUS_REF=${PREVIOUS_REF}" >> "$GITHUB_ENV"
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main
          echo "✅ Code updated to $(git rev-parse --short HEAD)"

      - name: Load environment
        working-directory: /home/ubuntu/projects/jedug_v2
        run: |
          set -Eeuo pipefail
          if [ -f backend/.env ]; then
            set -a
            . backend/.env
            set +a
          fi
          if [ -f frontend/.env ]; then
            set -a
            . frontend/.env
            set +a
          fi
          echo "✅ Environment loaded"

      - name: Backend preflight
        working-directory: /home/ubuntu/projects/jedug_v2/backend
        run: |
          set -Eeuo pipefail
          export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:$PATH"
          go run ./cmd/preflight || { echo "❌ Backend preflight failed"; exit 1; }
          ./scripts/verify_schema_governance.sh || { echo "❌ Schema governance failed"; exit 1; }
          echo "✅ Backend preflight OK"

      - name: Frontend preflight
        working-directory: /home/ubuntu/projects/jedug_v2/frontend
        run: |
          set -Eeuo pipefail
          test -n "${PUBLIC_API_BASE_URL:-}" || { echo "❌ PUBLIC_API_BASE_URL not set"; exit 1; }
          test -n "${PUBLIC_APP_BASE_URL:-}" || { echo "❌ PUBLIC_APP_BASE_URL not set"; exit 1; }
          echo "✅ Frontend preflight OK"

      - name: Build backend (gas)
        working-directory: /home/ubuntu/projects/jedug_v2/backend
        run: |
          set -Eeuo pipefail
          export PATH="$HOME/.local/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:/usr/local/go/bin:$PATH"
          gas build --no-ui --yes --type go --pm2-name jedug-backend --port 5000 --git-pull no || {
            echo "❌ Backend build failed, attempting rollback..."
            cd /home/ubuntu/projects/jedug_v2
            git reset --hard "${PREVIOUS_REF}"
            gas build --no-ui --yes --type go --pm2-name jedug-backend --port 5000 --git-pull no
            echo "⚠️ Rolled back to ${PREVIOUS_REF}"
            exit 1
          }
          echo "✅ Backend built"

      - name: Build frontend (gas)
        working-directory: /home/ubuntu/projects/jedug_v2/frontend
        run: |
          set -Eeuo pipefail
          export PATH="$HOME/.local/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:/usr/local/go/bin:$PATH"
          gas build --no-ui --yes --type node-web --pm2-name jedug-frontend --port 5001 --git-pull no || {
            echo "❌ Frontend build failed, attempting rollback..."
            cd /home/ubuntu/projects/jedug_v2
            git reset --hard "${PREVIOUS_REF}"
            cd backend && gas build --no-ui --yes --type go --pm2-name jedug-backend --port 5000 --git-pull no
            cd ../frontend && gas build --no-ui --yes --type node-web --pm2-name jedug-frontend --port 5001 --git-pull no
            echo "⚠️ Rolled back to ${PREVIOUS_REF}"
            exit 1
          }
          echo "✅ Frontend built"

      - name: Verify runtime
        run: |
          set -Eeuo pipefail
          export PATH="$HOME/.local/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:$PATH"

          # Check PM2 processes
          pm2 jlist | python3 -c "
          import sys, json
          arr = json.load(sys.stdin)
          for name in ['jedug-backend', 'jedug-frontend']:
              p = next((x for x in arr if x['name'] == name), None)
              if not p: print(f'❌ {name} not found'); sys.exit(1)
              if p['pm2_env']['status'] != 'online': print(f'❌ {name} not online'); sys.exit(1)
              print(f'✅ {name} online')
          "

          # Check ports
          ss -ltn | awk '{print $4}' | grep -E '(:5000$|:5001$)' || { echo "❌ Ports not listening"; exit 1; }

          # HTTP healthchecks
          curl -sf --retry 12 --retry-delay 2 --retry-connrefused http://127.0.0.1:5000/api/v1/health | grep -q '"status":"ok"' || { echo "❌ Backend healthcheck failed"; exit 1; }
          curl -sf --retry 12 --retry-delay 2 --retry-connrefused http://127.0.0.1:5001/health | grep -q '"status":"ok"' || { echo "❌ Frontend healthcheck failed"; exit 1; }

          echo "✅ Runtime verification passed"

      - name: Verify public ingress
        run: |
          set -Eeuo pipefail
          test -n "${PUBLIC_APP_BASE_URL:-}" || { echo "❌ PUBLIC_APP_BASE_URL not set"; exit 1; }
          test -n "${PUBLIC_API_BASE_URL:-}" || { echo "❌ PUBLIC_API_BASE_URL not set"; exit 1; }

          curl -sf "${PUBLIC_APP_BASE_URL}/health" | grep -q '"status":"ok"' || { echo "❌ Public frontend healthcheck failed"; exit 1; }
          curl -sf "${PUBLIC_API_BASE_URL}/api/v1/health" | grep -q '"status":"ok"' || { echo "❌ Public backend healthcheck failed"; exit 1; }
          curl -sf "${PUBLIC_API_BASE_URL}/api/v1/issues" | grep -q '"success":true' || { echo "❌ Public API issues failed"; exit 1; }

          echo "✅ Public ingress verification passed"

      - name: Save PM2
        run: |
          export PATH="$HOME/.local/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:$PATH"
          pm2 save
          echo "✅ Deploy complete"
