name: Deploy JEDUG

on:
  push:
    branches:
      - main

concurrency:
  group: jedug-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy backend + frontend
        working-directory: /home/ubuntu/projects/jedug_v2
        run: |
          set -Eeuo pipefail

          # Load PATH
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export PATH="$HOME/.local/bin:$PATH:/usr/local/go/bin"

          PROJECT_DIR="/home/ubuntu/projects/jedug_v2"
          BACKEND_DIR="${PROJECT_DIR}/backend"
          FRONTEND_DIR="${PROJECT_DIR}/frontend"
          BACKEND_PM2="jedug-backend"
          FRONTEND_PM2="jedug-frontend"
          BACKEND_PORT="5000"
          FRONTEND_PORT="5001"

          fail() { echo "[DEPLOY][ERROR] $1" >&2; exit 1; }

          load_env_file() {
            local env_file="$1"
            if [ -f "$env_file" ]; then
              set -a; . "$env_file"; set +a
            fi
          }

          check_pm2_online() {
            local name="$1"
            local status
            status="$(pm2 jlist | node -e "const fs=require('fs'); const input=fs.readFileSync(0,'utf8'); const arr=JSON.parse(input||'[]'); const name=process.argv[1]; const p=arr.find(x=>x.name===name); if(!p){process.exit(2);} console.log(p.pm2_env?.status||'unknown');" "$name")" || fail "PM2 process '${name}' not found"
            [ "$status" = "online" ] || fail "PM2 '${name}' not online (status=${status})"
          }

          check_port_listen() {
            ss -ltn | awk '{print $4}' | grep -E "(^|:)$1$" >/dev/null 2>&1 || fail "Port $1 not listening"
          }

          echo "[DEPLOY] Pull latest code"
          cd "$PROJECT_DIR"
          PREVIOUS_REF="$(git rev-parse HEAD)"
          git fetch --prune origin || fail "git fetch failed"
          git checkout main || fail "git checkout failed"
          git reset --hard origin/main || fail "git reset failed"
          TARGET_REF="$(git rev-parse --short HEAD)"

          echo "[DEPLOY] Load environment"
          load_env_file "${BACKEND_DIR}/.env"
          load_env_file "${FRONTEND_DIR}/.env"

          echo "[DEPLOY] Backend preflight"
          cd "$BACKEND_DIR"
          go run ./cmd/preflight || fail "Backend preflight failed"
          ./scripts/verify_schema_governance.sh || fail "Schema governance failed"

          echo "[DEPLOY] Frontend preflight"
          cd "$FRONTEND_DIR"
          [ -n "${PUBLIC_API_BASE_URL:-}" ] || fail "PUBLIC_API_BASE_URL not set"
          [ -n "${PUBLIC_APP_BASE_URL:-}" ] || fail "PUBLIC_APP_BASE_URL not set"

          echo "[DEPLOY] Build backend"
          cd "$BACKEND_DIR"
          gas build --no-ui --yes --type go --pm2-name "$BACKEND_PM2" --port "$BACKEND_PORT" --git-pull no || {
            echo "[DEPLOY][ROLLBACK] Backend build failed, rolling back to ${PREVIOUS_REF}"
            cd "$PROJECT_DIR" && git reset --hard "$PREVIOUS_REF"
            cd "$BACKEND_DIR" && gas build --no-ui --yes --type go --pm2-name "$BACKEND_PM2" --port "$BACKEND_PORT" --git-pull no
            fail "Backend build failed; rolled back to ${PREVIOUS_REF}"
          }

          echo "[DEPLOY] Build frontend"
          cd "$FRONTEND_DIR"
          gas build --no-ui --yes --type node-web --pm2-name "$FRONTEND_PM2" --port "$FRONTEND_PORT" --git-pull no || {
            echo "[DEPLOY][ROLLBACK] Frontend build failed, rolling back to ${PREVIOUS_REF}"
            cd "$PROJECT_DIR" && git reset --hard "$PREVIOUS_REF"
            cd "$BACKEND_DIR" && gas build --no-ui --yes --type go --pm2-name "$BACKEND_PM2" --port "$BACKEND_PORT" --git-pull no
            cd "$FRONTEND_DIR" && gas build --no-ui --yes --type node-web --pm2-name "$FRONTEND_PM2" --port "$FRONTEND_PORT" --git-pull no
            fail "Frontend build failed; rolled back to ${PREVIOUS_REF}"
          }

          echo "[DEPLOY] Verify runtime"
          check_pm2_online "$BACKEND_PM2"
          check_pm2_online "$FRONTEND_PM2"
          check_port_listen "$BACKEND_PORT"
          check_port_listen "$FRONTEND_PORT"

          curl -sf --retry 12 --retry-delay 2 --retry-connrefused http://127.0.0.1:${BACKEND_PORT}/api/v1/health | grep -q '"status":"ok"' || fail "Backend healthcheck failed"
          curl -sf --retry 12 --retry-delay 2 --retry-connrefused http://127.0.0.1:${FRONTEND_PORT}/health | grep -q '"status":"ok"' || fail "Frontend healthcheck failed"

          echo "[DEPLOY] Verify public ingress"
          curl -sf "${PUBLIC_APP_BASE_URL}/health" | grep -q '"status":"ok"' || fail "Public frontend failed"
          curl -sf "${PUBLIC_API_BASE_URL}/api/v1/health" | grep -q '"status":"ok"' || fail "Public backend failed"
          curl -sf "${PUBLIC_API_BASE_URL}/api/v1/issues" | grep -q '"success":true' || fail "Public API issues failed"

          pm2 save || fail "pm2 save failed"

          echo "[DEPLOY] ✅ Success: backend + frontend healthy at commit ${TARGET_REF}"
